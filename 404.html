<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Boho Life</title>

<link rel="icon" type="image/jpeg" href="boho-life-favicon.jpeg">

<style>
  body {
    background: #fdf6f0;
    color: #6b4f3f;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    text-align: center;
  }
  h1 {
    font-size: 3rem;
    color: #c76b44;
    text-shadow: 1px 1px 3px #f4e1d2;
    margin-bottom: 15px;
  }
  p {
    opacity: 0.8;
    margin-bottom: 25px;
  }
  .decor-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: #8c5e4a;
    border: 2px solid #8c5e4a;
    padding: 12px;
    border-radius: 16px;
    width: 220px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 0 8px #8c5e4a;
    background: #fff8f2;
  }
  .decor-card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #8c5e4a;
  }
  .decor-card img {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 10px;
  }
  .enter-btn {
    margin-top: 6px;
    background: rgba(140,94,74,0.1);
    padding: 5px 0;
    width: 100%;
    border-radius: 16px;
    border: 1px solid #8c5e4a;
    font-weight: 600;
  }
  a.art-link {
    color: #a286ef;
    text-decoration: none;
    margin-top: 18px;
    font-size: 0.85rem;
    opacity: 0.8;
    display: inline-block;
    transition: opacity 0.2s ease;
  }
  a.art-link:hover {
    opacity: 1;
  }
</style>
</head>
<body>

<h1>Oops… Lost in the Decor</h1>
<p>[404] The vibes didn’t survive the trip</p>

<a class="decor-card" href="https://maximumreality.github.io/decor/">
  <img src="boho-life-favicon.jpeg" alt="Boho Life Portal">
  <div>RETURN TO DECOR HUB</div>
  <div class="enter-btn">ENTER</div>
</a>

<a class="art-link" href="https://maximumreality.github.io/art/" target="_blank">
  ✨ Explore Void Bloom
</a>

</body>
</html>
