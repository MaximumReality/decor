<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Boho Life Collage</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  :root {
    --wall-color: #4a5d6a;
    --floor-color: #3d2b1f;
    --sidebar-bg: #1a1f24;
    --accent: #8ec5d6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Georgia', serif; background: #0f1418; overflow: hidden; height: 100vh; width: 100vw; }

  #sidebar { position: fixed; top: 0; left: 0; width: 220px; height: 100%; background: var(--sidebar-bg); color: #d4c9bc; z-index: 999; display: flex; flex-direction: column; box-shadow: 4px 0 20px rgba(0,0,0,0.5); }
  #sidebar.closed { transform: translateX(-100%); }
  #sidebar-header { background: #141820; padding: 14px 16px; }
  #sidebar-header h2 { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
  .spawn-btn { display: block; width: 100%; margin: 4px 0; padding: 8px 10px; background: #2a3540; color: #d4c9bc; border: 1px solid rgba(255,255,255,0.06); border-radius: 4px; cursor: pointer; }
  .spawn-btn:hover { background: #374b5a; }

  .ui-btn { position: fixed; z-index: 1000; background: #141820; color: var(--accent); border: 1px solid rgba(142,197,214,0.25); border-radius: 6px; padding: 6px 10px; cursor: pointer; }
  #toggleSidebar { top: 10px; left: 10px; }
  #musicBtn { top: 10px; right: 10px; }
  #saveBtn { bottom: 10px; right: 10px; }

  .room { position: relative; width: 100vw; height: 100vh; }
  .wall { height: 70%; background: var(--wall-color); }
  .floor { height: 30%; background: var(--floor-color); }
  #items { position: absolute; inset: 0; pointer-events: none; }

  .item {
    position: absolute; background-size: contain; background-repeat: no-repeat;
    cursor: grab; pointer-events: all; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.45));
  }
  .item .delete-btn {
    position: absolute; top: -10px; right: -10px; width: 22px; height: 22px;
    background: rgba(180,60,60,0.85); color: white; border-radius: 50%; text-align: center;
    line-height: 18px; opacity: 0; cursor: pointer;
  }
  .item.selected .delete-btn { opacity: 1; pointer-events: all; }

  /* Furniture sprites */
  .green-couch { background-image: url('sprites/green-couch.png'); width:120px; height:120px; }
  .dark-purple-couch { background-image: url('sprites/dark-purple-couch.png'); width:120px; height:120px; }
  .pink-couch { background-image: url('sprites/pink-couch.png'); width:120px; height:120px; }
  .purple-couch { background-image: url('sprites/purple-couch.png'); width:120px; height:120px; }
  .red-couch { background-image: url('sprites/red-couch.png'); width:120px; height:120px; }
  .purple-wingback-chair { background-image: url('sprites/purple-wingback-chair.png'); width:100px; height:110px; }
  .yellow-chair { background-image: url('sprites/yellow-chair.png'); width:100px; height:110px; }
  .potted-plant { background-image: url('sprites/potted-plant.png'); width:80px; height:80px; }
  .pink-potted-plant { background-image: url('sprites/pink-potted-plant.png'); width:80px; height:80px; }
  .purple-plant-stand { background-image: url('sprites/purple-plant-stand.png'); width:80px; height:80px; }
  .lake-art { background-image: url('sprites/lake-art.png'); width:100px; height:100px; }
  .macrame-art { background-image: url('sprites/macrame-art.png'); width:100px; height:100px; }
  .meadow-art { background-image: url('sprites/meadow-art.png'); width:100px; height:100px; }
  .mirror-art { background-image: url('sprites/mirror-art.png'); width:100px; height:100px; }
  .wood-floor-shelves { background-image: url('sprites/wood-floor-shelves.png'); width:120px; height:100px; }
  .purple-rug { background-image: url('sprites/purple-rug.png'); width:120px; height:60px; }
  .vertical-rug { background-image: url('sprites/vertical-rug.png'); width:60px; height:120px; }

  /* Characters - Super Simple */
  .character {
    position: absolute; background-size: contain; background-repeat: no-repeat;
    pointer-events: none; z-index: 5; filter: drop-shadow(3px 5px 8px rgba(0,0,0,0.4));
    transition: left 2.6s ease-in-out, top 2.6s ease-in-out;
  }
  #human { width: 68px; height: 95px; background-image: url('sprites/human.png'); } /* idle face forward */
  #cat1, #cat2 { width: 52px; height: 42px; background-image: url('sprites/cat-sit.png'); }

  /* Walking states */
  #human.walking  { background-image: url('sprites/human-walk.png'); }
  #human.walking2 { background-image: url('sprites/human-walk-2.png'); }

  #cat1.walking, #cat2.walking { background-image: url('sprites/cat-walk.png'); }
  #cat1.laying, #cat2.laying   { background-image: url('sprites/cat-lay.png'); }

  .mood-particle {
    position: absolute; font-size: 20px; pointer-events: none;
    animation: moodFloat 2.5s ease-out forwards; z-index: 30;
  }
  @keyframes moodFloat { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-90px); opacity: 0; } }
</style>
</head>
<body>

<button id="toggleSidebar" class="ui-btn">☰</button>
<button id="musicBtn" class="ui-btn">🎶</button>
<button id="saveBtn" class="ui-btn">📸</button>

<audio id="bgMusic" src="audio/boho-bg.mp3" loop></audio>

<aside id="sidebar">
  <div id="sidebar-header">
    <h2>Boho Life</h2>
    <div id="color-row">
      <input type="color" id="wallPicker" value="#4a5d6a">
      <span>Wall Color</span>
    </div>
  </div>
  <div id="sidebar-body">
    <h3>Room</h3>
    <button class="spawn-btn" onclick="saveRoom()">💾 Save</button>
    <button class="spawn-btn" onclick="loadRoom()">📂 Load</button>
    <button class="spawn-btn" onclick="clearRoom()">🧹 Clear</button>

    <h3>Furniture</h3>
    <button class="spawn-btn" data-type="green-couch" data-zone="floor">Green Couch</button>
    <button class="spawn-btn" data-type="purple-couch" data-zone="floor">Purple Couch</button>
    <button class="spawn-btn" data-type="pink-couch" data-zone="floor">Pink Couch</button>
    <button class="spawn-btn" data-type="potted-plant" data-zone="floor">Plant</button>
    <button class="spawn-btn" data-type="pink-potted-plant" data-zone="floor">Pink Plant</button>
    <button class="spawn-btn" data-type="wood-floor-shelves" data-zone="floor">Shelves</button>
    <button class="spawn-btn" data-type="purple-rug" data-zone="floor">Purple Rug</button>
  </div>
</aside>

<div class="room">
  <div class="wall" id="wall"></div>
  <div class="floor"></div>
  <div id="items"></div>
  <div id="human" class="character"></div>
  <div id="cat1" class="character"></div>
  <div id="cat2" class="character"></div>
</div>

<script>
let zTop = 10;
const wall = document.getElementById('wall');
const picker = document.getElementById('wallPicker');
const itemsEl = document.getElementById('items');
const human = document.getElementById('human');
const cat1 = document.getElementById('cat1');
const cat2 = document.getElementById('cat2');

picker.addEventListener('input', e => wall.style.background = e.target.value);
document.getElementById('toggleSidebar').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('closed'));

document.querySelectorAll('.spawn-btn[data-type]').forEach(btn => {
  btn.addEventListener('click', () => spawnItem(btn.dataset.type, btn.dataset.zone));
});

function spawnItem(type, zone) {
  const el = document.createElement('div');
  el.classList.add('item', type);
  el.style.left = '140px';
  el.style.top = zone === 'floor' ? '65%' : '20%';
  const del = document.createElement('button'); del.className = 'delete-btn'; del.textContent = '×';
  del.onclick = (e) => { e.stopPropagation(); el.remove(); updateHappiness(); };
  el.appendChild(del);
  itemsEl.appendChild(el);
  makeDraggable(el);
  updateHappiness();
}

function makeDraggable(el) {
  let dragging = false, startX, startY, startLeft, startTop;
  el.addEventListener('pointerdown', e => {
    if (e.target.tagName === 'BUTTON') return;
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    const r = el.getBoundingClientRect();
    startLeft = r.left; startTop = r.top;
    el.style.zIndex = ++zTop;
  });
  el.addEventListener('pointermove', e => {
    if (!dragging) return;
    el.style.left = (startLeft + e.clientX - startX) + 'px';
    el.style.top  = (startTop + e.clientY - startY) + 'px';
  });
  el.addEventListener('pointerup', () => { dragging = false; updateHappiness(); });
}

// Life Sim - Super Simple 2-frame human + 3-state cats
let happiness = 50;

function moveCharacters() {
  // Human moves with 2-frame walk
  human.style.transition = 'left 2.8s ease-in-out, top 2.8s ease-in-out';
  human.style.left = (Math.random() * 60 + 20) + '%';
  human.style.top  = (Math.random() * 30 + 48) + '%';

  human.classList.add('walking');
  setTimeout(() => { human.classList.remove('walking'); human.classList.add('walking2'); }, 900);
  setTimeout(() => human.classList.remove('walking2'), 1900);

  // Cats - walk then lay down
  [cat1, cat2].forEach((cat, i) => {
    cat.style.transition = 'left 2.1s ease-in-out, top 2.1s ease-in-out';
    cat.style.left = (Math.random() * 65 + 15) + '%';
    cat.style.top  = (Math.random() * 35 + 50) + '%';

    cat.classList.add('walking');
    setTimeout(() => {
      cat.classList.remove('walking');
      cat.classList.add('laying');
    }, 1400 + i * 250);
    setTimeout(() => cat.classList.remove('laying'), 3000);
  });

  showMood();
}

function showMood() {
  const emojis = happiness > 70 ? ['✨','💖','😻'] : ['🌿','🐾'];
  for (let i = 0; i < 5; i++) {
    const p = document.createElement('div');
    p.className = 'mood-particle';
    p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    p.style.left = (Math.random()*70 + 15) + '%';
    p.style.top = '55%';
    document.querySelector('.room').appendChild(p);
    setTimeout(() => p.remove(), 2200);
  }
}

function updateHappiness() {
  let score = 30 + document.querySelectorAll('.item').length * 6;
  happiness = Math.min(100, score);
  if (Math.random() > 0.35) moveCharacters();
}

// Initial placement
setTimeout(() => {
  human.style.left = '38%'; human.style.top = '52%';
  cat1.style.left = '52%';  cat1.style.top = '65%';
  cat2.style.left = '68%';  cat2.style.top = '60%';
  moveCharacters();
}, 600);

// Gentle idle movement every ~12 seconds
setInterval(() => { if (Math.random() > 0.4) moveCharacters(); }, 12000);

// Save / Load / Clear / Screenshot
function saveRoom() {
  const data = { wall: wall.style.background, items: [] };
  document.querySelectorAll('.item').forEach(el => {
    data.items.push({ type: [...el.classList].find(c => c !== 'item'), left: el.style.left, top: el.style.top });
  });
  localStorage.setItem('bohoLife', JSON.stringify(data));
  alert('Room Saved 🌿');
}

function loadRoom() {
  const saved = localStorage.getItem('bohoLife');
  if (!saved) return;
  const data = JSON.parse(saved);
  itemsEl.innerHTML = '';
  wall.style.background = data.wall || '#4a5d6a';
  data.items.forEach(item => spawnItem(item.type, 'floor'));
}

function clearRoom() {
  if (confirm('Clear everything?')) {
    itemsEl.innerHTML = '';
    updateHappiness();
  }
}

document.getElementById('saveBtn').onclick = async () => {
  const canvas = await html2canvas(document.querySelector('.room'));
  const a = document.createElement('a');
  a.download = 'boho-life.png';
  a.href = canvas.toDataURL();
  a.click();
};

document.getElementById('musicBtn').onclick = () => {
  const m = document.getElementById('bgMusic');
  m.paused ? m.play() : m.pause();
};
</script>
</body>
</html>
