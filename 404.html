<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 – Page Not Found</title>
  <link rel="icon" href="boho-life-favicon.jpeg">
  <style>
    body {
      background: #fff0e6;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      position: relative;
    }

    h1 {
      font-size: 5rem;
      margin: 0.5rem;
      color: #d46a6a;
      text-shadow: 2px 2px #ffd6a5;
    }

    p {
      font-size: 1.5rem;
      margin: 1rem;
      text-align: center;
    }

    a {
      color: #6a9dd4;
      text-decoration: none;
      font-weight: bold;
    }

    #secret-egg {
      position: absolute;
      bottom: 15px;
      right: 15px;
      font-size: 1.5rem;
      cursor: pointer;
      opacity: 0.25;
      transition: all 0.3s ease;
    }

    #secret-egg:hover {
      opacity: 1;
      transform: scale(1.3) rotate(20deg);
    }

    .floating {
      position: absolute;
      font-size: 2rem;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(10deg); }
    }

    /* Pulsing portal image */
    #portal {
      width: 180px;
      height: 180px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 20px #ffb6c1, 0 0 40px #ffb6c1 inset;
      margin: 30px 0;
      animation: pulse 2s infinite alternate;
    }

    #portal img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 20px #ffb6c1, 0 0 40px #ffb6c1 inset; transform: scale(1); }
      50% { box-shadow: 0 0 30px #ffb6c1, 0 0 60px #ffb6c1 inset; transform: scale(1.05); }
      100% { box-shadow: 0 0 20px #ffb6c1, 0 0 40px #ffb6c1 inset; transform: scale(1); }
    }
  </style>
</head>
<body>
  <h1>404</h1>
  <p>Looks like this page wandered off into the void…</p>

  <!-- Pulsing Boho Life Portal -->
  <div id="portal">
    <img src="https://maximumreality.github.io/decor/boho-life-favicon.jpeg" alt="Boho Life">
  </div>

  <p>Return to the <a href="https://maximumreality.github.io/decor/">Decor Hub</a> or explore the <a href="https://maximumreality.github.io/art/">Void Bloom</a>.</p>

  <!-- Easter egg -->
  <div id="secret-egg">✨</div>

  <!-- Floating chaos elements -->
  <div class="floating" style="top:10%; left:20%;">🌿</div>
  <div class="floating" style="top:70%; left:80%;">🪴</div>
  <div class="floating" style="top:50%; left:40%;">🌀</div>
  <div class="floating" style="top:30%; left:60%;">🍄</div>
  <div class="floating" style="top:80%; left:10%;">💫</div>

  <script>
    const secretEgg = document.getElementById('secret-egg');
    secretEgg.addEventListener('click', () => {
      window.open('https://maximumreality.github.io/whispering-woods/', '_blank');
      alert("You've discovered Whispering Woods! 🌲✨");
    });
  </script>
</body>
</html>
