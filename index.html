<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Boho Rain Decor Sim</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f1418;
      overflow: hidden;
    }

    :root {
      --wall-color: #4a5d6a;
      --floor-color: #3d2b1f;
    }

    /* Toggle Button */
    #toggleSidebar {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 1000;
      padding: 10px;
      background: #222;
      color: white;
      border: none;
      border-radius: 6px;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 220px;
      height: 100%;
      background: #1e272e;
      color: white;
      padding: 15px;
      transform: translateX(0);
      transition: transform 0.3s ease;
      z-index: 999;
    }

    .sidebar.closed {
      transform: translateX(-100%);
    }

    .spawn-btn {
      display: block;
      margin: 8px 0;
      width: 100%;
      padding: 8px;
      background: #34495e;
      color: white;
      border: none;
      border-radius: 4px;
    }

    /* Room */
    .room {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .wall {
      height: 70%;
      background: var(--wall-color);
      position: relative;
    }

    .floor {
      height: 30%;
      background: var(--floor-color);
    }

    /* Window + rain */
    .window {
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 250px;
      border: 10px solid #2c3e50;
      overflow: hidden;
      background: #111;
    }

    .rain {
      position: absolute;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.2) 0px,
        rgba(255,255,255,0.2) 2px,
        transparent 2px,
        transparent 6px
      );
      animation: rain 0.4s linear infinite;
    }

    @keyframes rain {
      from { transform: translateY(0); }
      to { transform: translateY(20px); }
    }

    /* Items */
    #items {
      position: absolute;
      inset: 0;
    }

    .item {
      position: absolute;
      width: 80px;
      height: 80px;
      background-size: contain;
      background-repeat: no-repeat;
      cursor: grab;
    }

    /* Example sprites */
    .sofa {
      background-image: url('sprites/sofa.png');
    }

    .plant {
      background-image: url('sprites/plant.png');
    }

  </style>
</head>

<body>

<button id="toggleSidebar">☰</button>

<aside class="sidebar" id="sidebar">
  <h2>Boho Studio</h2>

  <label>Wall Color</label>
  <input type="color" id="wallPicker">

  <h3>Furniture</h3>
  <button class="spawn-btn" data-type="sofa">Sofa</button>
  <button class="spawn-btn" data-type="plant">Plant</button>
</aside>

<div class="room">
  <div class="wall" id="wall">
    <div class="window">
      <div class="rain"></div>
    </div>
  </div>

  <div class="floor"></div>

  <div id="items"></div>
</div>

<script>
  const sidebar = document.getElementById('sidebar');
  const toggle = document.getElementById('toggleSidebar');
  const wall = document.getElementById('wall');
  const picker = document.getElementById('wallPicker');
  const items = document.getElementById('items');

  // Sidebar toggle
  toggle.onclick = () => {
    sidebar.classList.toggle('closed');
  };

  // Wall color
  picker.oninput = (e) => {
    wall.style.background = e.target.value;
  };

  // Spawn items
  document.querySelectorAll('.spawn-btn').forEach(btn => {
    btn.onclick = () => {
      const type = btn.dataset.type;

      const el = document.createElement('div');
      el.className = 'item ' + type;

      el.style.left = "100px";
      el.style.top = "100px";

      items.appendChild(el);

      makeDraggable(el);
    };
  });

  // Basic drag (works on phone too)
  function makeDraggable(el) {
    let offsetX = 0;
    let offsetY = 0;
    let dragging = false;

    el.addEventListener('pointerdown', (e) => {
      dragging = true;
      offsetX = e.offsetX;
      offsetY = e.offsetY;
      el.setPointerCapture(e.pointerId);
    });

    el.addEventListener('pointermove', (e) => {
      if (!dragging) return;

      el.style.left = (e.clientX - offsetX) + 'px';
      el.style.top = (e.clientY - offsetY) + 'px';
    });

    el.addEventListener('pointerup', () => {
      dragging = false;
    });
  }
</script>

</body>
</html>
